---
name: Continuous Integration Template - ALZ Management Runners
on:
  workflow_call:
    inputs:
      root_module_folder_relative_path:
        description: Root Module Folder Relative Path
        default: workloads/alz-mgmt-runners
        type: string
      terraform_cli_version:
        description: Terraform CLI Version
        default: 1.14.8
        type: string
      backend_state_key:
        description: Backend state key for runner stack
        default: alz-mgmt-runners.tfstate
        type: string

jobs:
  validate:
    name: Validate Terraform
    runs-on:
      - self-hosted
      - Linux
      - X64
    environment: alz-runners-plan
    steps:
      - name: Checkout Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_cli_version }}

      - name: Terraform Format Check
        run: |
          terraform \
          -chdir="${{ inputs.root_module_folder_relative_path }}" \
          fmt -check

  plan:
    name: Validate Terraform Plan
    needs: validate
    runs-on:
      - self-hosted
      - Linux
      - X64
    concurrency: alz-runners-tfstate
    environment: alz-runners-plan
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      ARM_CLIENT_ID: "${{ vars.AZURE_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ vars.AZURE_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ vars.AZURE_TENANT_ID }}"
      ARM_USE_AZUREAD: true
      ARM_USE_OIDC: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_cli_version }}

      - name: Terraform Init
        run: |
          terraform \
          -chdir="${{ inputs.root_module_folder_relative_path }}" \
          init \
          -backend-config="resource_group_name=${{ vars.BACKEND_AZURE_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME }}" \
          -backend-config="key=${{ inputs.backend_state_key }}"

      - name: Terraform Plan
        id: plan
        run: |
          terraform \
          -chdir="${{ inputs.root_module_folder_relative_path }}" \
          plan \
          -input=false \
          -var-file="terraform.tfvars"

      - name: Update Pull Request
        if: (success() || failure()) && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Run details</summary>

            The plan was a ${{ steps.plan.outcome }} see the action for more details.

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
