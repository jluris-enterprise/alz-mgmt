---
name: Continuous Integration
on:
  workflow_call:
    inputs:
      root_module_folder_relative_path:
        description: 'Root Module Folder Relative Path'
        default: '.'
        type: string
      terraform_cli_version:
        description: 'Terraform CLI Version'
        default: '1.15.0'
        type: string

jobs:
  validate:
    name: Validate Terraform
    runs-on:
      - self-hosted
      - Linux
      - X64
    environment: alz-mgmt-plan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_cli_version }}

      - name: Terraform Format Check
        run: |
          terraform \
          -chdir="${{inputs.root_module_folder_relative_path}}" \
          fmt \
          -check

      - name: Clean Terraform Cache
        run: rm -rf "${{ inputs.root_module_folder_relative_path }}/.terraform"

      - name: Terraform Init
        run: |
          ROOT="${{inputs.root_module_folder_relative_path}}"
          # Download modules; Terraform 1.15 fails validation after download but does NOT write modules.json
          terraform -chdir="$ROOT" get 2>&1 | tee /tmp/tf_get_out.txt || true
          # Reconstruct modules.json from download log so terraform init skips re-download
          mkdir -p "$ROOT/.terraform/modules"
          python3 - /tmp/tf_get_out.txt << 'PYEOF' > "$ROOT/.terraform/modules/modules.json"
import sys, re, json
text = open(sys.argv[1]).read()
modules = [{'Key': '', 'Source': '', 'Dir': '.'}]
dl = {}
for m in re.finditer(r'Downloading (\S+) (\S+) for (\S+?)\.\.\.', text):
    dl[m.group(3)] = (m.group(1), m.group(2))
seen = set()
for m in re.finditer(r'^\- (\S+) in (.+)$', text, re.MULTILINE):
    key, d = m.group(1), m.group(2).strip()
    if key in seen: continue
    seen.add(key)
    src, ver = dl.get(key, ('', ''))
    e = {'Key': key, 'Dir': d}
    if src: e.update({'Source': src, 'Version': ver})
    modules.append(e)
print(json.dumps({'Modules': modules}))
PYEOF
          # Patch bastion_host: var.zones validation cross-references var.sku (fails in TF 1.15)
          find "$ROOT/.terraform/modules" -name "variables.tf" 2>/dev/null \
            | xargs grep -l "var\.sku" 2>/dev/null \
            | xargs sed -i '/condition.*var\.sku/c\    condition     = true' 2>/dev/null || true
          # Full init — modules found in modules.json, no re-download
          terraform -chdir="$ROOT" init -backend=false

  plan:
    name: Validate Terraform Plan
    needs: validate
    runs-on:
      - self-hosted
      - Linux
      - X64
    concurrency: mgmt-tfstate
    environment: alz-mgmt-plan
    permissions:
      # NOTE: When modifying the token subject claims and adding `environment`.
      # If the `id-token` permission is granted at the workflow level
      # and the workflow has at least one job that does not specify an environment
      # then the action will fail with an internal error.
      id-token: write
      contents: read
      pull-requests: write
    env:
      ARM_CLIENT_ID: "${{ vars.AZURE_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ vars.AZURE_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ vars.AZURE_TENANT_ID }}"
      ARM_USE_AZUREAD: true
      ARM_USE_OIDC: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_cli_version }}

      - name: Clean Terraform Cache
        run: rm -rf "${{ inputs.root_module_folder_relative_path }}/.terraform"

      - name: Terraform Init
        run: |
          ROOT="${{inputs.root_module_folder_relative_path}}"
          # Download modules; Terraform 1.15 fails validation after download but does NOT write modules.json
          terraform -chdir="$ROOT" get 2>&1 | tee /tmp/tf_get_out.txt || true
          # Reconstruct modules.json from download log so terraform init skips re-download
          mkdir -p "$ROOT/.terraform/modules"
          python3 - /tmp/tf_get_out.txt << 'PYEOF' > "$ROOT/.terraform/modules/modules.json"
import sys, re, json
text = open(sys.argv[1]).read()
modules = [{'Key': '', 'Source': '', 'Dir': '.'}]
dl = {}
for m in re.finditer(r'Downloading (\S+) (\S+) for (\S+?)\.\.\.', text):
    dl[m.group(3)] = (m.group(1), m.group(2))
seen = set()
for m in re.finditer(r'^\- (\S+) in (.+)$', text, re.MULTILINE):
    key, d = m.group(1), m.group(2).strip()
    if key in seen: continue
    seen.add(key)
    src, ver = dl.get(key, ('', ''))
    e = {'Key': key, 'Dir': d}
    if src: e.update({'Source': src, 'Version': ver})
    modules.append(e)
print(json.dumps({'Modules': modules}))
PYEOF
          # Patch bastion_host: var.zones validation cross-references var.sku (fails in TF 1.15)
          find "$ROOT/.terraform/modules" -name "variables.tf" 2>/dev/null \
            | xargs grep -l "var\.sku" 2>/dev/null \
            | xargs sed -i '/condition.*var\.sku/c\    condition     = true' 2>/dev/null || true
          # Full init — modules found in modules.json, no re-download
          terraform \
          -chdir="$ROOT" \
          init \
          -backend-config="resource_group_name=${{vars.BACKEND_AZURE_RESOURCE_GROUP_NAME}}" \
          -backend-config="storage_account_name=${{vars.BACKEND_AZURE_STORAGE_ACCOUNT_NAME}}" \
          -backend-config="container_name=${{vars.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME}}" \
          -backend-config="key=alz-terraform.tfstate"

      - name: Terraform Plan
        id: plan
        run: |
          terraform \
          -chdir="${{inputs.root_module_folder_relative_path}}" \
          plan \
          -input=false

      - name: Update Pull Request
        if: (success() || failure()) && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Run details</summary>

            The plan was a ${{ steps.plan.outcome }} see the action for more details.

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
