---
name: Continuous Delivery - ALZ Management Runners
on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Terraform Action to perform
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      terraform_cli_version:
        description: Terraform CLI Version
        required: true
        default: 1.14.8
        type: string

jobs:
  plan_and_apply:
    uses: ./.github/workflows/cd-alz-mgmt-runners-template.yaml
    name: CD
    permissions:
      id-token: write
      contents: read
    with:
      terraform_action: ${{ inputs.terraform_action }}
      root_module_folder_relative_path: workloads/alz-mgmt-runners
      terraform_cli_version: ${{ inputs.terraform_cli_version }}
      backend_state_key: alz-mgmt-runners.tfstate
